openapi: 3.1.0
info:
  title: DMS API
  version: 0.1.0
  description: Contract ban đầu cho React Frontend và AWS Lambda.
servers:
  - url: https://api.example.com
    description: Placeholder; được thay bằng CDK output theo môi trường.
security:
  - cognitoJwt: []
paths:
  /me:
    get:
      operationId: getCurrentUser
      summary: Lấy thông tin người dùng hiện tại
      responses:
        '200':
          description: Thông tin người dùng đã xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /documents:
    get:
      operationId: listDocuments
      summary: Liệt kê tối đa 50 tài liệu gần nhất mà người dùng có quyền truy cập
      responses:
        '200':
          description: Danh sách tài liệu
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentSummary'
  /documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: getDocumentDetail
      summary: Lấy metadata an toàn của một tài liệu có quyền truy cập
      responses:
        '200':
          description: Chi tiết tài liệu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /documents/{documentId}/audit-events:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: listDocumentAuditEvents
      summary: Liet ke lich su hoat dong cua tai lieu cho owner va quan tri vien duoc phep
      responses:
        '200':
          description: Danh sach su kien audit cua tai lieu
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentAuditEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /documents/{documentId}/download-intents:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    post:
      operationId: createDownloadIntent
      summary: Tạo liên kết tải tài liệu READY có hiệu lực 5 phút
      responses:
        '201':
          description: Download intent đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadIntent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /documents/{documentId}/department-shares:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      operationId: listDepartmentShares
      summary: Liệt kê phòng ban đã được chia sẻ quyền với tài liệu
      responses:
        '200':
          description: Danh sách quyền chia sẻ đã cấp
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DepartmentShareSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createDepartmentShare
      summary: Chia sẻ tài liệu sang một phòng ban khác
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentShareRequest'
      responses:
        '201':
          description: Quyền chia sẻ đã được cấp ngay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentShareResult'
        '202':
          description: Yêu cầu chia sẻ đã được tạo và đang chờ duyệt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentShareResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /documents/{documentId}/department-shares/{targetDepartmentId}:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
      - $ref: '#/components/parameters/TargetDepartmentId'
    delete:
      operationId: revokeDepartmentShare
      summary: Thu hồi quyền chia sẻ tài liệu của một phòng ban
      responses:
        '200':
          description: Quyền chia sẻ đã được thu hồi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeDepartmentShareResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /documents/upload-intents:
    post:
      operationId: createUploadIntent
      summary: Tạo presigned upload URL sau khi kiểm tra metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUploadIntentRequest'
      responses:
        '201':
          description: Upload intent đã được tạo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIntent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /share-requests:
    get:
      operationId: listPendingShareRequests
      summary: Liệt kê yêu cầu chia sẻ đang chờ Department Admin duyệt
      responses:
        '200':
          description: Danh sách yêu cầu chia sẻ đang chờ duyệt
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DepartmentShareRequestSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /share-requests/{shareRequestId}/approve:
    parameters:
      - $ref: '#/components/parameters/ShareRequestId'
    post:
      operationId: approveShareRequest
      summary: Duyệt yêu cầu chia sẻ liên phòng ban
      responses:
        '200':
          description: Yêu cầu chia sẻ đã được duyệt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentShareDecisionResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /share-requests/{shareRequestId}/reject:
    parameters:
      - $ref: '#/components/parameters/ShareRequestId'
    post:
      operationId: rejectShareRequest
      summary: Từ chối yêu cầu chia sẻ liên phòng ban
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectShareRequestRequest'
      responses:
        '200':
          description: Yêu cầu chia sẻ đã bị từ chối
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentShareDecisionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    DocumentId:
      name: documentId
      in: path
      required: true
      description: Mã tài liệu
      schema:
        type: string
        format: uuid
    ShareRequestId:
      name: shareRequestId
      in: path
      required: true
      description: Mã yêu cầu chia sẻ tài liệu
      schema:
        type: string
        format: uuid
    TargetDepartmentId:
      name: targetDepartmentId
      in: path
      required: true
      description: Mã phòng ban đang có quyền chia sẻ
      schema:
        type: string
        minLength: 2
        maxLength: 40
  securitySchemes:
    cognitoJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CurrentUser:
      type: object
      required: [userId, email, displayName, departmentId, roles]
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        departmentId:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [EMPLOYEE, DEPARTMENT_ADMIN, SYSTEM_ADMIN]
    DocumentSummary:
      type: object
      required:
        [
          documentId,
          title,
          originalFileName,
          contentType,
          classification,
          accessScope,
          departmentId,
          ownerId,
          ownerEmail,
          sizeBytes,
          currentVersion,
          status,
          updatedAt,
        ]
      properties:
        documentId:
          type: string
          format: uuid
        title:
          type: string
        originalFileName:
          type: string
        contentType:
          type: string
        departmentId:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        accessScope:
          $ref: '#/components/schemas/DocumentAccessScope'
        ownerId:
          type: string
        ownerEmail:
          type: string
          format: email
        sizeBytes:
          type: integer
          minimum: 1
        currentVersion:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [UPLOAD_PENDING, UPLOADED, VALIDATING, SCANNING, READY, INFECTED, REJECTED, FAILED]
        statusReason:
          type: string
          description: Lý do an toàn dành cho người dùng khi tài liệu bị từ chối hoặc xử lý lỗi.
        updatedAt:
          type: string
          format: date-time
    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentSummary'
        - type: object
          required: [createdAt]
          properties:
            createdAt:
              type: string
              format: date-time
    DownloadIntent:
      type: object
      required: [downloadUrl, expiresAt, fileName]
      properties:
        downloadUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        fileName:
          type: string
    DocumentAuditEvent:
      type: object
      required: [eventId, action, actorType, actorId, source, outcome, occurredAt, versionNumber]
      properties:
        eventId:
          type: string
          format: uuid
        action:
          type: string
          enum:
            [
              UPLOAD_INTENT_CREATED,
              UPLOAD_VALIDATED,
              MALWARE_SCAN_STARTED,
              DOCUMENT_READY,
              DOCUMENT_REJECTED,
              MALWARE_DETECTED,
              PROCESSING_FAILED,
              MESSAGE_DEAD_LETTERED,
              DOCUMENT_DOWNLOAD_REQUESTED,
              DOCUMENT_SHARE_REQUESTED,
              DOCUMENT_SHARE_GRANTED,
              DOCUMENT_SHARE_APPROVED,
              DOCUMENT_SHARE_REJECTED,
              DOCUMENT_SHARE_REVOKED,
            ]
        actorType:
          type: string
          enum: [USER, SYSTEM]
        actorId:
          type: string
        source:
          type: string
          enum: [API, UPLOAD_PROCESSOR, DLQ_PROCESSOR]
        outcome:
          type: string
          enum: [SUCCESS, REJECTED, FAILED]
        occurredAt:
          type: string
          format: date-time
        versionNumber:
          type: integer
          minimum: 1
        reason:
          type: string
        details:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
    CreateDepartmentShareRequest:
      type: object
      required: [targetDepartmentId]
      properties:
        targetDepartmentId:
          type: string
          minLength: 2
          maxLength: 40
          description: Phòng ban nhận quyền chia sẻ
    DepartmentShareResult:
      type: object
      required: [mode, documentId, targetDepartmentId]
      properties:
        mode:
          type: string
          enum: [GRANTED, PENDING_APPROVAL]
        documentId:
          type: string
          format: uuid
        targetDepartmentId:
          type: string
        shareRequestId:
          type: string
          format: uuid
    DepartmentShareSummary:
      type: object
      required:
        [
          documentId,
          sourceDepartmentId,
          targetDepartmentId,
          requestedBy,
          approvedBy,
          requestedAt,
          approvedAt,
        ]
      properties:
        documentId:
          type: string
          format: uuid
        sourceDepartmentId:
          type: string
        targetDepartmentId:
          type: string
        requestedBy:
          type: string
        approvedBy:
          type: string
        requestedAt:
          type: string
          format: date-time
        approvedAt:
          type: string
          format: date-time
    DepartmentShareRequestSummary:
      type: object
      required:
        [
          shareRequestId,
          documentId,
          title,
          classification,
          sourceDepartmentId,
          targetDepartmentId,
          requestedByEmail,
          createdAt,
        ]
      properties:
        shareRequestId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        title:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        sourceDepartmentId:
          type: string
        targetDepartmentId:
          type: string
        requestedByEmail:
          type: string
        createdAt:
          type: string
          format: date-time
    RejectShareRequestRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
    DepartmentShareDecisionResult:
      type: object
      required: [shareRequestId, status]
      properties:
        shareRequestId:
          type: string
          format: uuid
        status:
          type: string
          enum: [APPROVED, REJECTED]
    RevokeDepartmentShareResult:
      type: object
      required: [documentId, targetDepartmentId, status]
      properties:
        documentId:
          type: string
          format: uuid
        targetDepartmentId:
          type: string
        status:
          type: string
          enum: [REVOKED]
    CreateUploadIntentRequest:
      type: object
      required:
        [
          title,
          departmentId,
          classification,
          originalFileName,
          contentType,
          sizeBytes,
          checksumSha256,
        ]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        departmentId:
          type: string
        classification:
          type: string
          enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
        accessScope:
          $ref: '#/components/schemas/DocumentAccessScope'
        originalFileName:
          type: string
          maxLength: 255
        contentType:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
        checksumSha256:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
        tags:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 40
    DocumentAccessScope:
      type: string
      enum: [DEPARTMENT, ALL_EMPLOYEES]
      description: DEPARTMENT chỉ trong phòng ban hiện tại; ALL_EMPLOYEES cho mọi nhân viên đăng nhập hợp lệ và chỉ System Admin được chọn khi upload.
    UploadIntent:
      type: object
      required: [uploadIntentId, documentId, versionNumber, uploadUrl, expiresAt, uploadHeaders]
      properties:
        uploadIntentId:
          type: string
          format: uuid
        documentId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        uploadUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        uploadHeaders:
          type: object
          additionalProperties:
            type: string
    Error:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        details:
          type: object
          additionalProperties: true
  responses:
    BadRequest:
      description: Request không hợp lệ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Thiếu hoặc sai thông tin xác thực
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Người dùng không có quyền thực hiện thao tác
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Không tìm thấy tài liệu hoặc không có quyền truy cập
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Trạng thái tài liệu chưa cho phép thao tác
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
